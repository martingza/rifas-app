<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - RifasApp</title>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎰</text></svg>">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card fade-in">
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <span style="font-size: 3rem;">🎰</span>
            </div>
            
            <h2>Iniciar Sesión</h2>
            <p class="subtitle">Accede a tu cuenta para administrar tus rifas</p>

            <div id="alertContainer"></div>

            <form id="loginForm" onsubmit="iniciarSesion(event)">
                <div class="form-group">
                    <label for="email">📧 Correo Electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">🔒 Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="Tu contraseña" required minlength="6">
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="btnLogin">
                    Iniciar Sesión
                </button>
            </form>

            <div class="divider">o</div>

            <p class="text-center" style="color: var(--gray);">
                ¿No tienes cuenta? 
                <a href="/registro" style="font-weight: 600;">Regístrate aquí</a>
            </p>

            <p class="text-center mt-2">
                <a href="/" style="color: var(--gray); font-size: 0.9rem;">← Volver al inicio</a>
            </p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="/js/app.js"></script>
    <script>
        // Si ya está logueado, redirigir
        if (obtenerToken()) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
